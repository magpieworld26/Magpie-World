kind = "web"
previewPath = "/"
title = "Magpie – Interactive Reading Platform"
version = "1.0.0"
id = "artifacts/magpie"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24343

[services.development]
run = "pnpm --filter @workspace/magpie run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/magpie", "run", "build" ]
publicDir = "artifacts/magpie/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24343"
BASE_PATH = "/"
